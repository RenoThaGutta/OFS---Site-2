<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavern Hall — Order of the Fallen Star</title>
  <link rel="icon" type="image/png" href="ofs favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070f;
      --bg-card:   #0e0e1c;
      --bg-card2:  #13132a;
      --gold:      #c9a84c;
      --gold-lt:   #e8ca6a;
      --gold-dim:  #6e5a28;
      --silver:    #b0b8c8;
      --silver-dim:#5a6272;
      --text:      #ddd8cc;
      --text-dim:  #7a7568;
      --b-gold:    rgba(201,168,76,.28);
      --b-dim:     rgba(201,168,76,.09);
      --glow:      rgba(201,168,76,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar             { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track       { background: var(--bg-card); }
    ::-webkit-scrollbar-thumb       { background: var(--gold-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    * { scrollbar-width: thin; scrollbar-color: var(--gold-dim) var(--bg-card); }

    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Page header ─────────────────────────────────────── */
    .page-header {
      position: relative; z-index: 1;
      padding: 100px 40px 48px;
      text-align: center;
      border-bottom: 1px solid var(--b-gold);
      background: linear-gradient(to bottom, rgba(201,168,76,.05) 0%, transparent 100%);
    }
    .page-header .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .63rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold-lt);
      text-shadow: 0 0 40px rgba(201,168,76,.3);
      margin-bottom: 12px;
    }
    .page-header p {
      font-family: 'Crimson Text', serif;
      font-size: 1.1rem;
      color: var(--text-dim);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Main layout ─────────────────────────────────────── */
    .tavern-container {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 48px 40px 80px;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-areas:
        "announce sidebar"
        "quests   sidebar"
        "media    sidebar";
      gap: 32px;
      align-items: start;
    }

    /* ── Shared section styles ───────────────────────────── */
    .tavern-section {
      border: 1px solid var(--b-gold);
      border-radius: 6px;
      background: var(--bg-card);
      overflow: hidden;
    }
    .section-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--b-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── Loading / empty states ──────────────────────────── */
    .state-loading, .state-empty {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-dim);
      font-size: .82rem;
    }
    .spinner-sm {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(201,168,76,.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Announcements ───────────────────────────────────── */
    #announcements-section { grid-area: announce; }

    .announce-list { display: flex; flex-direction: column; }
    .announce-card {
      padding: 16px 24px;
      border-bottom: 1px solid var(--b-dim);
      transition: background .2s;
    }
    .announce-card:last-child { border-bottom: none; }
    .announce-card:hover { background: rgba(201,168,76,.03); }
    .announce-card.pinned { background: rgba(201,168,76,.04); }
    .announce-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .announce-pin {
      font-size: .58rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,168,76,.12);
      border: 1px solid var(--b-gold);
      border-radius: 2px;
      padding: 1px 6px;
    }
    .announce-date  { font-size: .72rem; color: var(--text-dim); }
    .announce-author { font-size: .72rem; color: var(--silver-dim); margin-left: auto; }
    .announce-title {
      font-family: 'Cinzel', serif;
      font-size: .86rem;
      letter-spacing: .04em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .announce-body { font-size: .82rem; color: var(--text-dim); line-height: 1.65; }

    /* ── Quest Board ─────────────────────────────────────── */
    #quests-section { grid-area: quests; }

    .quest-tabs-bar { display: flex; }
    .quest-tab-btn {
      flex: 1;
      padding: 10px 0;
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--silver-dim);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .quest-tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .quest-tab-btn:hover:not(.active) { color: var(--silver); }

    .quest-panel { display: none; }
    .quest-panel.active { display: block; }

    .quest-list { display: flex; flex-direction: column; }
    .quest-card {
      padding: 16px 24px;
      border-bottom: 1px solid var(--b-dim);
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 14px;
      align-items: start;
      transition: background .2s;
    }
    .quest-card:last-child { border-bottom: none; }
    .quest-card:hover { background: rgba(201,168,76,.03); }

    .quest-img {
      width: 68px; height: 68px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--b-gold);
      background: var(--bg-card2);
      flex-shrink: 0;
      display: block;
    }
    .quest-img-placeholder {
      width: 68px; height: 68px;
      border-radius: 4px;
      border: 1px solid var(--b-dim);
      background: var(--bg-card2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .quest-img-placeholder svg { opacity: .22; }
    .quest-info { min-width: 0; }
    .quest-header-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .quest-name {
      font-family: 'Cinzel', serif;
      font-size: .84rem;
      letter-spacing: .04em;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .quest-type-badge {
      font-size: .58rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .quest-type-badge.type-quest {
      color: var(--gold);
      border: 1px solid var(--b-gold);
      background: rgba(201,168,76,.08);
    }
    .quest-type-badge.type-crusade {
      color: #c08060;
      border: 1px solid rgba(192,128,96,.35);
      background: rgba(192,128,96,.08);
    }
    .quest-completed-badge {
      font-size: .58rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      color: #4caf88;
      border: 1px solid rgba(76,175,136,.35);
      background: rgba(76,175,136,.08);
    }
    .quest-desc {
      font-size: .78rem;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .quest-footer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .72rem;
      color: var(--silver-dim);
      flex-wrap: wrap;
    }
    .quest-leader { color: var(--silver); }
    .quest-date { color: var(--text-dim); margin-left: auto; }

    /* ── Media Gallery ───────────────────────────────────── */
    #media-section { grid-area: media; }

    .media-filter-bar { display: flex; gap: 6px; }
    .media-filter-btn {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 11px;
      border-radius: 2px;
      border: 1px solid var(--b-dim);
      background: none;
      color: var(--silver-dim);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .media-filter-btn.active,
    .media-filter-btn:hover {
      color: var(--gold);
      border-color: var(--b-gold);
      background: rgba(201,168,76,.06);
    }

    .media-grid {
      padding: 16px 24px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .media-item {
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--b-dim);
      background: var(--bg-card2);
      position: relative;
      aspect-ratio: 16/9;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
    }
    .media-item:hover { border-color: var(--b-gold); transform: translateY(-2px); }
    .media-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .media-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(to top, rgba(7,7,15,.85) 0%, transparent 100%);
      font-size: .7rem;
      color: var(--text);
      transform: translateY(100%);
      transition: transform .2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .media-item:hover .media-caption { transform: translateY(0); }
    .media-play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .tavern-sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 82px;
    }

    /* ── Personal widget ─────────────────────────────────── */
    #personal-widget {
      border: 1px solid var(--b-gold);
      border-radius: 6px;
      background: var(--bg-card);
      overflow: hidden;
    }
    .widget-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--b-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .widget-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--b-gold);
      object-fit: cover;
      background: var(--bg-card2);
    }
    .widget-player-name {
      font-family: 'Cinzel', serif;
      font-size: .76rem;
      letter-spacing: .08em;
      color: var(--gold);
    }
    .widget-player-rank { font-size: .68rem; color: var(--silver-dim); }
    .widget-body { padding: 14px 20px; }
    .widget-label {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .widget-quest-item {
      padding: 8px 10px;
      border-radius: 3px;
      border: 1px solid var(--b-dim);
      background: var(--bg-card2);
      margin-bottom: 6px;
    }
    .widget-quest-item:last-child { margin-bottom: 0; }
    .widget-quest-name { font-size: .78rem; color: var(--text); margin-bottom: 2px; }
    .widget-quest-meta { font-size: .68rem; color: var(--text-dim); }
    .widget-no-quests { font-size: .78rem; color: var(--text-dim); text-align: center; padding: 12px 0; }

    /* ── Events ──────────────────────────────────────────── */
    .event-list { display: flex; flex-direction: column; }
    .event-card {
      padding: 12px 20px;
      border-bottom: 1px solid var(--b-dim);
      transition: background .2s;
    }
    .event-card:last-child { border-bottom: none; }
    .event-card:hover { background: rgba(201,168,76,.03); }
    .event-title {
      font-family: 'Cinzel', serif;
      font-size: .76rem;
      letter-spacing: .04em;
      color: var(--text);
      margin-bottom: 5px;
    }
    .event-meta { display: flex; align-items: center; gap: 8px; font-size: .7rem; flex-wrap: wrap; }
    .event-date { color: var(--text-dim); }
    .event-type-tag { color: var(--silver-dim); margin-left: auto; font-size: .65rem; }
    .event-status {
      font-size: .56rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 2px;
    }
    .event-status.ongoing  { color: var(--gold);      border: 1px solid var(--b-gold); background: rgba(201,168,76,.10); }
    .event-status.upcoming { color: var(--silver-dim); border: 1px solid var(--b-dim); }
    .event-status.past     { color: var(--text-dim);   border: 1px solid rgba(201,168,76,.06); }

    /* ── Lightbox ────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.9);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner { max-width: 1100px; width: 100%; position: relative; }
    .lightbox-inner img {
      width: 100%; height: auto;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      display: block;
    }
    .lightbox-inner iframe {
      width: 100%; aspect-ratio: 16/9;
      border: none; border-radius: 4px; display: block;
    }
    .lightbox-close {
      position: absolute; top: -36px; right: 0;
      background: none; border: none;
      color: var(--silver); font-size: 1.4rem;
      cursor: pointer; line-height: 1;
      transition: color .2s;
    }
    .lightbox-close:hover { color: var(--gold); }
    .lightbox-caption {
      margin-top: 10px;
      text-align: center;
      font-size: .8rem;
      color: var(--text-dim);
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--b-gold);
      padding: 32px 40px;
      text-align: center;
    }
    .footer-links {
      display: flex; justify-content: center;
      gap: 24px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .footer-links a {
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--silver-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy { font-size: .72rem; color: var(--text-dim); }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 1024px) {
      .tavern-container {
        grid-template-columns: 1fr;
        grid-template-areas: "announce" "sidebar" "quests" "media";
        padding: 32px 24px 60px;
      }
      .tavern-sidebar { position: static; }
    }
    @media (max-width: 600px) {
      .page-header { padding: 90px 20px 36px; }
      .page-header h1 { font-size: 1.8rem; }
      .tavern-container { padding: 24px 16px 48px; gap: 20px; }
      .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .media-grid { padding: 12px 16px 20px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .quest-card { grid-template-columns: 52px 1fr; gap: 10px; padding: 14px 16px; }
      .quest-img, .quest-img-placeholder { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <nav id="main-nav"></nav>

  <!-- Page header -->
  <header class="page-header">
    <div class="eyebrow">Order of the Fallen Star</div>
    <h1>Tavern Hall</h1>
    <p>News from the field. Active quests. Moments worth remembering.</p>
  </header>

  <!-- Main content -->
  <div class="tavern-container">

    <!-- ── Announcements ── -->
    <section class="tavern-section" id="announcements-section">
      <div class="section-header">
        <span class="section-title">Announcements</span>
      </div>
      <div id="announcements-list">
        <div class="state-loading"><span class="spinner-sm"></span>Loading…</div>
      </div>
    </section>

    <!-- ── Quest Board ── -->
    <section class="tavern-section" id="quests-section">
      <div class="section-header">
        <span class="section-title">Quest Board</span>
        <div class="quest-tabs-bar" id="quest-tabs">
          <button class="quest-tab-btn active" data-panel="quests-active">Active</button>
          <button class="quest-tab-btn" data-panel="quests-completed">Completed</button>
        </div>
      </div>
      <div id="quests-active" class="quest-panel active">
        <div class="state-loading"><span class="spinner-sm"></span>Loading…</div>
      </div>
      <div id="quests-completed" class="quest-panel">
        <div class="state-loading"><span class="spinner-sm"></span>Loading…</div>
      </div>
    </section>

    <!-- ── Media Gallery ── -->
    <section class="tavern-section" id="media-section">
      <div class="section-header">
        <span class="section-title">Gallery</span>
        <div class="media-filter-bar" id="media-filter-bar">
          <button class="media-filter-btn active" data-filter="all">All</button>
          <button class="media-filter-btn" data-filter="screenshot">Screenshots</button>
          <button class="media-filter-btn" data-filter="video">Videos</button>
        </div>
      </div>
      <div id="media-grid" class="media-grid">
        <div class="state-loading" style="grid-column:1/-1"><span class="spinner-sm"></span>Loading…</div>
      </div>
    </section>

    <!-- ── Sidebar ── -->
    <aside class="tavern-sidebar">

      <!-- Personal widget (shown when logged in) -->
      <div id="personal-widget" style="display:none;"></div>

      <!-- Events -->
      <div class="tavern-section" id="events-section">
        <div class="section-header">
          <span class="section-title">Events</span>
        </div>
        <div id="events-list">
          <div class="state-loading"><span class="spinner-sm"></span>Loading…</div>
        </div>
      </div>

    </aside>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner" id="lightbox-inner">
      <button class="lightbox-close" id="lightbox-close">&#x2715;</button>
      <div id="lightbox-content"></div>
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-links">
      <a href="OFS_Home.html">Home</a>
      <a href="OFS_Codex.html">Codex</a>
      <a href="OFS_Timeline.html">Chronicles</a>
      <a href="OFS_Roster.html">Roster</a>
      <a href="OFS_TavernHall.html">Tavern Hall</a>
      <a href="OFS_Admin.html">Admin</a>
    </div>
    <div class="footer-copy">&copy; Order of the Fallen Star. All rights reserved.</div>
  </footer>

  <script src="ofs-data.js"></script>
  <script src="ofs-sheets.js"></script>
  <script src="header_bar.js"></script>
  <script src="ofs-nav.js"></script>
  <script>
  /* ── Starfield ───────────────────────────────────────── */
  (function () {
    var canvas = document.getElementById('starfield');
    var ctx    = canvas.getContext('2d');
    var stars  = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      resize();
      stars = [];
      var count = Math.floor((canvas.width * canvas.height) / 6000);
      for (var i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.2,
          a: Math.random(),
          da: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1)
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        s.a += s.da;
        if (s.a > 1 || s.a < 0) s.da = -s.da;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(220,215,200,' + Math.min(1, Math.max(0, s.a)).toFixed(2) + ')';
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', init);
    init();
    draw();
  }());

  /* ── Quest tab switching ─────────────────────────────── */
  document.getElementById('quest-tabs').addEventListener('click', function (e) {
    var btn = e.target.closest('.quest-tab-btn');
    if (!btn) return;
    document.querySelectorAll('.quest-tab-btn').forEach(function (b) { b.classList.remove('active'); });
    document.querySelectorAll('.quest-panel').forEach(function (p) { p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
  });

  /* ── Media filter ────────────────────────────────────── */
  var _allMediaItems = [];

  document.getElementById('media-filter-bar').addEventListener('click', function (e) {
    var btn = e.target.closest('.media-filter-btn');
    if (!btn) return;
    document.querySelectorAll('.media-filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderMedia(_allMediaItems, btn.dataset.filter);
  });

  /* ── Lightbox ────────────────────────────────────────── */
  var _lb        = document.getElementById('lightbox');
  var _lbContent = document.getElementById('lightbox-content');
  var _lbCaption = document.getElementById('lightbox-caption');

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  _lb.addEventListener('click', function (e) { if (e.target === _lb) closeLightbox(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeLightbox(); });

  function openLightboxImage(url, caption) {
    _lbContent.innerHTML = '<img src="' + esc(url) + '" alt="' + esc(caption) + '">';
    _lbCaption.textContent = caption || '';
    _lb.classList.add('open');
  }

  function openLightboxVideo(embedUrl, caption) {
    _lbContent.innerHTML = '<iframe src="' + esc(embedUrl) + '" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    _lbCaption.textContent = caption || '';
    _lb.classList.add('open');
  }

  function closeLightbox() {
    _lb.classList.remove('open');
    _lbContent.innerHTML = '';
  }

  /* ── Helpers ─────────────────────────────────────────── */
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(str) {
    if (!str) return '';
    var d = new Date(str);
    if (isNaN(d.getTime())) return String(str);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtRelative(str) {
    if (!str) return '';
    var d = new Date(str);
    if (isNaN(d.getTime())) return String(str);
    var diff = Date.now() - d.getTime();
    if (diff < 60000)    return 'just now';
    if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    var days = Math.floor(diff / 86400000);
    if (days < 30) return days + 'd ago';
    return fmtDate(str);
  }

  function getYouTubeId(url) {
    if (!url) return null;
    var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  /* ── Render: Announcements ───────────────────────────── */
  function renderAnnouncements(rows) {
    var el = document.getElementById('announcements-list');

    if (!rows || rows.length < 2) {
      el.innerHTML = '<div class="state-empty">No announcements at this time.</div>';
      return;
    }

    var items = rows.slice(1).map(function (row) {
      return {
        title:  String(row[1] || ''),
        body:   String(row[2] || ''),
        date:   String(row[3] || ''),
        author: String(row[4] || ''),
        pinned: String(row[5] || '').toLowerCase() === 'true' || row[5] === true || row[5] === 1
      };
    }).filter(function (a) { return a.title; });

    items.sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return new Date(b.date) - new Date(a.date);
    });

    if (items.length === 0) {
      el.innerHTML = '<div class="state-empty">No announcements at this time.</div>';
      return;
    }

    var html = '<div class="announce-list">';
    items.forEach(function (a) {
      html += '<div class="announce-card' + (a.pinned ? ' pinned' : '') + '">';
      html += '<div class="announce-meta">';
      if (a.pinned)  html += '<span class="announce-pin">Pinned</span>';
      if (a.date)    html += '<span class="announce-date">' + esc(fmtDate(a.date)) + '</span>';
      if (a.author)  html += '<span class="announce-author">— ' + esc(a.author) + '</span>';
      html += '</div>';
      html += '<div class="announce-title">' + esc(a.title) + '</div>';
      if (a.body) html += '<div class="announce-body">' + esc(a.body) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

  /* ── Render: Quest Board ─────────────────────────────── */
  function buildQuestMap(rows) {
    if (!rows || rows.length < 2) return { active: [], completed: [] };

    var map = {};
    rows.slice(1).forEach(function (row) {
      var pid = String(row[0] || '').trim();
      if (!pid) return;

      if (!map[pid]) {
        map[pid] = {
          id:           pid,
          leaderName:   String(row[1] || ''),
          leaderId:     String(row[2] || '').trim(),
          name:         String(row[3] || '').trim(),
          description:  String(row[4] || ''),
          image:        String(row[5] || ''),
          startTime:    String(row[6] || ''),
          completed:    '',
          type:         String(row[10] || 'Quest'),
          participants: []
        };
      }

      // First non-empty Quest Completed timestamp wins (leader's row)
      if (row[9] && !map[pid].completed) map[pid].completed = String(row[9]);

      // Track participants via Player ID column
      var playerId = String(row[7] || '').trim();
      if (playerId && map[pid].participants.indexOf(playerId) === -1) {
        map[pid].participants.push(playerId);
      }
    });

    var active = [], completed = [];
    Object.keys(map).forEach(function (pid) {
      var q = map[pid];
      if (!q.name) return;
      if (q.completed) completed.push(q);
      else             active.push(q);
    });

    active.sort(function (a, b)    { return new Date(b.startTime) - new Date(a.startTime); });
    completed.sort(function (a, b) { return new Date(b.completed) - new Date(a.completed); });

    return { active: active, completed: completed };
  }

  function questCardHTML(q) {
    var isCrusade = String(q.type).toLowerCase() === 'crusade';
    var typeClass = isCrusade ? 'type-crusade' : 'type-quest';
    var typeLabel = isCrusade ? 'Crusade'      : 'Quest';

    var imgHtml;
    if (q.image) {
      imgHtml =
        '<img class="quest-img" src="' + esc(q.image) + '" alt="' + esc(q.name) + '"' +
        ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="quest-img-placeholder" style="display:none;">' + _questIcon() + '</div>';
    } else {
      imgHtml = '<div class="quest-img-placeholder">' + _questIcon() + '</div>';
    }

    var dateStr = q.completed ? fmtRelative(q.completed) : fmtRelative(q.startTime);

    var html = '<div class="quest-card">';
    html += imgHtml;
    html += '<div class="quest-info">';
    html += '<div class="quest-header-row">';
    html += '<div class="quest-name">' + esc(q.name) + '</div>';
    html += '<span class="quest-type-badge ' + typeClass + '">' + typeLabel + '</span>';
    if (q.completed) html += '<span class="quest-completed-badge">Completed</span>';
    html += '</div>';
    if (q.description) html += '<div class="quest-desc">' + esc(q.description) + '</div>';
    html += '<div class="quest-footer-row">';
    if (q.leaderName) html += '<span class="quest-leader">&#9670; ' + esc(q.leaderName) + '</span>';
    if (q.participants.length > 0) {
      html += '<span>' + q.participants.length + ' member' + (q.participants.length !== 1 ? 's' : '') + '</span>';
    }
    if (dateStr) html += '<span class="quest-date">' + esc(dateStr) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  function _questIcon() {
    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none">' +
      '<path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02' +
      'L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>' +
      '</svg>';
  }

  function renderQuests(rows) {
    var data = buildQuestMap(rows);

    var activeEl = document.getElementById('quests-active');
    if (data.active.length === 0) {
      activeEl.innerHTML = '<div class="state-empty">No active quests at this time.</div>';
    } else {
      var aHtml = '<div class="quest-list">';
      data.active.forEach(function (q) { aHtml += questCardHTML(q); });
      aHtml += '</div>';
      activeEl.innerHTML = aHtml;
    }

    var completedEl = document.getElementById('quests-completed');
    if (data.completed.length === 0) {
      completedEl.innerHTML = '<div class="state-empty">No completed quests yet.</div>';
    } else {
      var cHtml = '<div class="quest-list">';
      data.completed.forEach(function (q) { cHtml += questCardHTML(q); });
      cHtml += '</div>';
      completedEl.innerHTML = cHtml;
    }

    // Update tab labels with counts
    var tabs = document.querySelectorAll('.quest-tab-btn');
    if (tabs[0]) tabs[0].textContent = 'Active (' + data.active.length + ')';
    if (tabs[1]) tabs[1].textContent = 'Completed (' + data.completed.length + ')';

    return data;
  }

  /* ── Render: Events ──────────────────────────────────── */
  function renderEvents(rows) {
    var el = document.getElementById('events-list');

    if (!rows || rows.length < 2) {
      el.innerHTML = '<div class="state-empty">No upcoming events.</div>';
      return;
    }

    var statusOrder = { ongoing: 0, upcoming: 1, past: 2 };
    var items = rows.slice(1).map(function (row) {
      return {
        title:  String(row[1] || ''),
        date:   String(row[2] || ''),
        type:   String(row[3] || ''),
        status: String(row[5] || 'upcoming').toLowerCase()
      };
    }).filter(function (e) { return e.title; });

    items.sort(function (a, b) {
      var so = (statusOrder[a.status] != null ? statusOrder[a.status] : 1) -
               (statusOrder[b.status] != null ? statusOrder[b.status] : 1);
      if (so !== 0) return so;
      return new Date(a.date) - new Date(b.date);
    });

    if (items.length === 0) {
      el.innerHTML = '<div class="state-empty">No upcoming events.</div>';
      return;
    }

    var html = '<div class="event-list">';
    items.forEach(function (ev) {
      var sc = ev.status === 'ongoing' ? 'ongoing' : ev.status === 'past' ? 'past' : 'upcoming';
      var sl = ev.status === 'ongoing' ? 'Live'    : ev.status === 'past' ? 'Ended' : 'Upcoming';
      html += '<div class="event-card">';
      html += '<div class="event-title">' + esc(ev.title) + '</div>';
      html += '<div class="event-meta">';
      if (ev.date) html += '<span class="event-date">' + esc(fmtDate(ev.date)) + '</span>';
      html += '<span class="event-status ' + sc + '">' + sl + '</span>';
      if (ev.type) html += '<span class="event-type-tag">' + esc(ev.type) + '</span>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    el.innerHTML = html;
  }

  /* ── Render: Media Gallery ───────────────────────────── */
  function renderMedia(items, filter) {
    var grid = document.getElementById('media-grid');

    var filtered = items;
    if (filter && filter !== 'all') {
      filtered = items.filter(function (m) {
        return m.type === filter;
      });
    }

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="state-empty" style="grid-column:1/-1">' +
        (items.length === 0 ? 'No media yet.' : 'No ' + esc(filter) + 's found.') + '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function (m) {
      if (m.type === 'video') {
        var ytId = getYouTubeId(m.url);
        if (!ytId) return;
        var thumb    = 'https://img.youtube.com/vi/' + ytId + '/mqdefault.jpg';
        var embedUrl = 'https://www.youtube.com/embed/' + ytId + '?autoplay=1';
        html += '<div class="media-item" data-type="video"' +
          ' data-url="' + esc(embedUrl) + '" data-caption="' + esc(m.caption) + '"' +
          ' title="' + esc(m.caption) + '">';
        html += '<img src="' + esc(thumb) + '" alt="' + esc(m.caption) + '" loading="lazy">';
        html += '<div class="media-play-icon">' +
          '<svg width="40" height="40" viewBox="0 0 40 40" fill="none">' +
          '<circle cx="20" cy="20" r="19" stroke="rgba(201,168,76,.6)" stroke-width="1.5"/>' +
          '<path d="M16 13l13 7-13 7V13z" fill="rgba(201,168,76,.9)"/>' +
          '</svg></div>';
        if (m.caption) html += '<div class="media-caption">' + esc(m.caption) + '</div>';
        html += '</div>';
      } else {
        html += '<div class="media-item" data-type="screenshot"' +
          ' data-url="' + esc(m.url) + '" data-caption="' + esc(m.caption) + '"' +
          ' title="' + esc(m.caption) + '">';
        html += '<img src="' + esc(m.url) + '" alt="' + esc(m.caption) + '" loading="lazy">';
        if (m.caption) html += '<div class="media-caption">' + esc(m.caption) + '</div>';
        html += '</div>';
      }
    });

    grid.innerHTML = html || '<div class="state-empty" style="grid-column:1/-1">No media yet.</div>';

    grid.querySelectorAll('.media-item').forEach(function (item) {
      item.addEventListener('click', function () {
        if (item.dataset.type === 'video') openLightboxVideo(item.dataset.url, item.dataset.caption);
        else                               openLightboxImage(item.dataset.url, item.dataset.caption);
      });
    });
  }

  /* ── Render: Personal Widget ─────────────────────────── */
  function renderPersonalWidget(session, questData) {
    var widget = document.getElementById('personal-widget');
    if (!session || !session.id) { widget.style.display = 'none'; return; }

    var player = null;
    if (window.OFSData && typeof OFSData.getPlayerById === 'function') {
      player = OFSData.getPlayerById(session.id);
    }

    var username  = (player && player.username) || session.username || 'Member';
    var rank      = (player && player.rank)     || '';
    var avatarUrl = (player && player.avatarUrl) || session.avatarUrl || 'ofs_logo.png';

    var myActive = ((questData && questData.active) || []).filter(function (q) {
      return q.participants.indexOf(session.id) !== -1 || q.leaderId === session.id;
    });

    var html = '';
    html += '<div class="section-header" style="padding:14px 20px;">';
    html += '<span class="section-title" style="font-size:.7rem;">Your Quest Log</span>';
    html += '</div>';
    html += '<div class="widget-header">';
    html += '<img class="widget-avatar" src="' + esc(avatarUrl) + '" alt="' + esc(username) + '"' +
            ' onerror="this.src=\'ofs_logo.png\'">';
    html += '<div>';
    html += '<div class="widget-player-name">' + esc(username) + '</div>';
    if (rank) html += '<div class="widget-player-rank">' + esc(rank) + '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="widget-body">';
    if (myActive.length === 0) {
      html += '<div class="widget-no-quests">No active quests.</div>';
    } else {
      html += '<div class="widget-label">Active</div>';
      myActive.slice(0, 5).forEach(function (q) {
        html += '<div class="widget-quest-item">';
        html += '<div class="widget-quest-name">' + esc(q.name) + '</div>';
        html += '<div class="widget-quest-meta">Led by ' + esc(q.leaderName) + '</div>';
        html += '</div>';
      });
    }
    html += '</div>';

    widget.innerHTML = html;
    widget.style.display = 'block';
  }

  /* ── Main data load ──────────────────────────────────── */
  (function () {
    var session = null;
    try { session = JSON.parse(sessionStorage.getItem('ofs_discord_session') || 'null'); } catch (e) {}

    OFSSheets.load().then(function () {
      var tavData = OFSSheets.getTavernData();

      var announceRows = (tavData && tavData.tavAnnouncements) || [];
      var questRows    = (tavData && tavData.quests)           || [];
      var eventRows    = (tavData && tavData.tavEvents)        || [];
      var mediaRawRows = (tavData && tavData.tavMedia)         || [];

      // Parse media rows (skip header)
      var mediaItems = [];
      if (mediaRawRows.length > 1) {
        mediaRawRows.slice(1).forEach(function (row) {
          if (!row[2]) return; // require URL
          mediaItems.push({
            id:      String(row[0] || ''),
            type:    String(row[1] || 'screenshot').toLowerCase(),
            url:     String(row[2] || ''),
            caption: String(row[3] || ''),
            date:    String(row[4] || ''),
            author:  String(row[5] || '')
          });
        });
        mediaItems.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
      }
      _allMediaItems = mediaItems;

      renderAnnouncements(announceRows);
      var questData = renderQuests(questRows);
      renderEvents(eventRows);
      renderMedia(mediaItems, 'all');
      renderPersonalWidget(session, questData);

    }).catch(function (err) {
      console.error('TavernHall: failed to load data', err);
      renderAnnouncements(null);
      renderQuests(null);
      renderEvents(null);
      renderMedia([], 'all');
    });
  }());
  </script>
