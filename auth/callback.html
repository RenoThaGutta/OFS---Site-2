<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying — Order of the Fallen Star</title>
  <link rel="icon" type="image/png" href="../ofs favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #07070f;
      color: #ddd8cc;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 48px 56px;
      border: 1px solid rgba(201,168,76,.28);
      border-radius: 6px;
      background: #0e0e1c;
      max-width: 420px;
      width: 90%;
    }
    .logo { height: 52px; margin-bottom: 24px; filter: drop-shadow(0 0 10px rgba(201,168,76,.4)); }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 20px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(201,168,76,.2);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message { font-size: 13px; color: #7a7568; line-height: 1.6; }
    .message a { color: #c9a84c; text-decoration: none; }
    .message a:hover { text-decoration: underline; }
    .error-icon { font-size: 32px; margin-bottom: 16px; }
    .status-ok   { color: #4caf88; }
    .status-err  { color: #c9574c; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../ofs_logo.png" alt="OFS">
    <h1 id="heading">Verifying Identity</h1>
    <div id="spinner" class="spinner"></div>
    <p id="message" class="message">Authenticating with Discord…</p>
  </div>

  <script>
    /* ── Config ─────────────────────────────────────── */
    var WORKER_URL   = 'https://ofs-api.orderofthefallenstar.workers.dev';
    var SESSION_KEY  = 'ofs_discord_session';
    var PAGE_HOME    = '../OFS_Home.html';
    var PAGE_ADMIN   = '../OFS_Admin.html';

    /* ── DOM helpers ─────────────────────────────────── */
    var heading  = document.getElementById('heading');
    var spinner  = document.getElementById('spinner');
    var message  = document.getElementById('message');

    function showError(title, detail) {
      heading.textContent = title;
      heading.classList.add('status-err');
      spinner.style.display = 'none';
      message.innerHTML = detail + '<br><br><a href="../OFS_Home.html">← Return to site</a>';
    }

    function showSuccess(username, dest) {
      heading.textContent = 'Welcome, ' + username;
      heading.classList.add('status-ok');
      spinner.style.display = 'none';
      message.innerHTML = 'Identity verified. Redirecting…';
      setTimeout(function () { location.replace(dest); }, 1200);
    }

    /* ── Main flow ───────────────────────────────────── */
    (function () {
      var params = new URLSearchParams(location.search);
      var code   = params.get('code');

      if (!code) {
        showError('Invalid Callback', 'No authorisation code was received from Discord.');
        return;
      }

      /* Exchange code for session via Cloudflare Worker */
      fetch(WORKER_URL + '/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ code: code })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({
            id:        data.id,
            username:  data.username,
            avatarUrl: data.avatarUrl,
            token:     data.token,
            isAdmin:   data.isAdmin || false
          }));
          var dest = data.isAdmin ? PAGE_ADMIN : PAGE_HOME;
          showSuccess(data.username, dest);
        } else {
          showError('Authentication Failed', data.reason || 'Discord authentication failed.');
        }
      })
      .catch(function () {
        showError('Network Error', 'Could not reach the authentication server. Please try again.');
      });
    }());
  </script>
</body>
</html>
