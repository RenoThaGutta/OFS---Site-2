<!DOCTYPE html>
<html lang="en" style="background:#07070f">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Sheet — Order of the Fallen Star</title>
  <link rel="icon" type="image/png" href="ofs favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ofs-api.orderofthefallenstar.workers.dev" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="preconnect" href="https://drive.google.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070f;
      --bg-card:   #0e0e1c;
      --bg-card2:  #13132a;
      --gold:      #c9a84c;
      --gold-lt:   #e8ca6a;
      --gold-dim:  #6e5a28;
      --silver:    #b0b8c8;
      --silver-dim:#5a6272;
      --text:      #ddd8cc;
      --text-dim:  #7a7568;
      --b-gold:    rgba(201,168,76,.28);
      --b-dim:     rgba(201,168,76,.09);
      --glow:      rgba(201,168,76,.12);
    }

    html { font-size: 16px; background: #07070f; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Navigation handled by header_bar.js ── */

    #starfield {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 92px 28px 72px;
    }

    /* ── Page Breadcrumb ─────────────────────────────────── */
    .page-breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 0 28px;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--b-dim);
    }
    .page-breadcrumb a {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--silver-dim);
      text-decoration: none;
      transition: color .2s;
    }
    .page-breadcrumb a:hover { color: var(--gold); }
    .page-breadcrumb .sep {
      color: var(--text-dim);
      font-size: .65rem;
    }
    .page-breadcrumb .current {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── Footer ──────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 44px 0 18px;
      border-top: 1px solid var(--b-gold);
      margin-top: 64px;
    }
    .footer-glory {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 20px;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 6px;
      flex-wrap: wrap; list-style: none; margin-bottom: 18px;
    }
    .footer-links a {
      font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--silver-dim);
      text-decoration: none; padding: 4px 10px; transition: color .2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy { font-family: 'Inter', sans-serif; font-size: .7rem; color: var(--text-dim); }
    .footer-sc { margin-top: 20px; opacity: .35; transition: opacity .2s; }
    .footer-sc:hover { opacity: .55; }
    .footer-sc img { height: 48px; display: block; margin: 0 auto; }

    /* ── Player Identity ─────────────────────────────────── */
    .identity {
      display: flex;
      align-items: center;
      gap: 36px;
      background: var(--bg-card);
      border: 1px solid var(--b-gold);
      border-radius: 3px;
      padding: 32px 36px;
      margin-bottom: 44px;
      box-shadow: 0 0 48px rgba(201,168,76,.04), inset 0 1px 0 rgba(201,168,76,.08);
      position: relative;
    }
    .identity-bg {
      position: absolute; inset: 0; z-index: 0;
      overflow: hidden; border-radius: 3px;
      background-size: cover; background-position: center;
      pointer-events: none;
    }
    .identity-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(14,14,28,.95) 35%, rgba(14,14,28,.6));
    }
    .identity > :not(.identity-bg) { position: relative; z-index: 1; }
    .avatar {
      flex-shrink: 0;
      width: 114px; height: 114px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: var(--bg-card2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      color: var(--gold);
      box-shadow: 0 0 24px rgba(201,168,76,.28);
      text-shadow: 0 0 18px rgba(201,168,76,.5);
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .ident-divider {
      flex-shrink: 0;
      width: 1px; height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    }
    .ident-info { flex: 1; }
    .ident-username {
      font-family: 'Cinzel', serif;
      font-size: 2rem; font-weight: 700;
      color: var(--gold-lt);
      letter-spacing: .07em;
      text-shadow: 0 0 22px rgba(201,168,76,.3);
      margin-bottom: 8px;
    }
    .ident-rank {
      font-family: 'Cinzel', serif;
      font-size: .88rem;
      color: var(--silver);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .ident-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }
    .ident-banner-name {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--silver-dim);
    }
    .ident-banner-sep {
      color: var(--gold-dim);
      font-size: .65rem;
    }
    .ident-banner-rank {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .ident-ship {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: .95rem;
      color: var(--text-dim);
      margin-top: 3px;
    }

    /* ── Reputation level ────────────────────────────────── */
    .rep-block {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--b-dim);
      width: 100%;
    }
    .rep-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .rep-label {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .rep-level {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold-lt);
      line-height: 1;
      text-shadow: 0 0 16px rgba(201,168,76,.4);
    }
    .rep-level-max {
      color: var(--gold-lt);
      text-shadow: 0 0 20px rgba(201,168,76,.7);
    }
    .rep-xp-label {
      font-size: .68rem;
      color: var(--silver-dim);
      margin-left: auto;
      letter-spacing: .04em;
    }
    .rep-bar-bg {
      width: 100%; height: 5px;
      background: rgba(255,255,255,.05);
      border-radius: 3px;
      overflow: hidden;
    }
    .rep-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(to right, var(--gold-dim), var(--gold));
      transition: width .7s ease;
    }
    .rep-bar-fill.maxed {
      background: linear-gradient(to right, var(--gold), var(--gold-lt));
      box-shadow: 0 0 8px rgba(201,168,76,.5);
    }

    /* ── Banner Progress (identity top-right) ──────────── */
    .banner-progress {
      margin-left: auto;
      flex-shrink: 0;
      min-width: 200px;
      max-width: 260px;
      align-self: flex-start;
      margin-top: 4px;
    }
    .bp-label {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      white-space: nowrap;
    }
    .bp-track {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .bp-step {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,.06);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .bp-step-fill {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 0;
      background: linear-gradient(to right, var(--gold-dim), var(--gold));
      border-radius: inherit;
    }
    .bp-step-fill.maxed {
      background: linear-gradient(to right, var(--gold), var(--gold-lt));
      box-shadow: 0 0 6px rgba(201,168,76,.4);
    }
    .bp-markers {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 36px;
      margin-top: 6px;
      gap: 3px;
    }
    .bp-marker {
      font-family: 'Inter', sans-serif;
      font-size: .55rem;
      color: var(--silver-dim);
      text-align: left;
    }
    .bp-marker:last-child { text-align: right; }
    .bp-marker.active {
      color: var(--gold);
      font-weight: 500;
    }
    .bp-medal-end {
      width: 30px; height: 30px;
      object-fit: contain;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .bp-medal-end.locked {
      filter: grayscale(1) brightness(.4);
    }
    .bp-pts-label {
      font-family: 'Inter', sans-serif;
      font-size: .58rem;
      color: var(--silver-dim);
      margin-top: 4px;
      text-align: center;
      letter-spacing: .02em;
    }
    .bp-pts-label span { color: var(--gold); }
    .banner-progress { position: relative; cursor: default; }
    .bp-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 220px;
      background: rgba(14,14,28,.97);
      border: 1px solid var(--b-gold);
      border-radius: 6px;
      padding: 14px 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }
    .banner-progress:hover .bp-tooltip { display: block; }
    .bp-tip-title {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--b-dim);
    }
    .bp-tip-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-family: 'Inter', sans-serif;
      font-size: .65rem;
      color: var(--silver-dim);
    }
    .bp-tip-row.active { color: var(--gold-lt); }
    .bp-tip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--silver-dim);
      flex-shrink: 0;
    }
    .bp-tip-row.active .bp-tip-dot { background: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,.5); }
    .bp-tip-row.done .bp-tip-dot { background: var(--gold-dim); }
    .bp-tip-pts {
      margin-left: auto;
      font-size: .58rem;
      color: var(--text-dim);
    }
    .bp-tip-row.active .bp-tip-pts { color: var(--gold); }

    /* ── Section header ──────────────────────────────────── */
    .sec-head {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 22px;
    }
    .sec-head h2 {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }
    .sec-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
    }

    /* ── Stats grid ──────────────────────────────────────── */
    .stats-section { margin-bottom: 52px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--b-dim);
      border-radius: 3px;
      padding: 18px 22px;
      transition: border-color .2s, box-shadow .2s;
    }
    .stat-card:hover {
      border-color: var(--b-gold);
      box-shadow: 0 0 18px var(--glow);
    }
    .stat-lbl {
      font-size: .65rem;
      letter-spacing: .17em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .stat-val {
      font-family: 'Cinzel', serif;
      font-size: 1.9rem; font-weight: 600;
      color: var(--silver);
      line-height: 1;
    }

    /* ── Banners grid ────────────────────────────────────── */
    .banners-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .banner-card {
      background: var(--bg-card);
      border: 1px solid var(--b-dim);
      border-radius: 3px;
      padding: 20px 16px 16px;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .banner-card:hover {
      border-color: var(--b-gold);
      box-shadow: 0 0 22px var(--glow);
      transform: translateY(-2px);
    }
    .banner-card.has-medal  { border-color: rgba(201,168,76,.2); }
    .banner-card.is-master  {
      border-color: rgba(201,168,76,.48);
      box-shadow: 0 0 22px rgba(201,168,76,.1);
    }

    /* medal area */
    .medal-wrap {
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
    }
    .medal-wrap img {
      width: 120px; height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(201,168,76,.45));
    }
    .medal-locked {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px dashed var(--silver-dim);
      display: flex; align-items: center; justify-content: center;
      opacity: .3;
    }
    .medal-locked svg { width: 38px; height: 38px; fill: var(--silver-dim); }

    .banner-name {
      font-family: 'Cinzel', serif;
      font-size: .68rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    .banner-title {
      font-family: 'Cinzel', serif;
      font-size: .92rem; font-weight: 600;
      text-align: center;
    }
    .t0 { color: var(--text-dim); }
    .t1 { color: var(--silver); }
    .t2 { color: var(--silver); }
    .t3 { color: var(--gold-lt); text-shadow: 0 0 12px rgba(201,168,76,.45); }

    /* progress */
    .prog-wrap { width: 100%; }
    .prog-bg {
      width: 100%; height: 3px;
      background: rgba(255,255,255,.05);
      border-radius: 2px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(to right, var(--gold-dim), var(--gold));
      transition: width .6s ease;
    }
    .prog-fill.maxed {
      background: linear-gradient(to right, var(--gold), var(--gold-lt));
    }
    .prog-labels {
      display: flex; justify-content: space-between;
      margin-top: 5px;
      font-size: .58rem; letter-spacing: .07em; text-transform: uppercase;
    }
    .prog-cur  { color: var(--silver-dim); }
    .prog-next { color: var(--text-dim); }
    .prog-lock { color: var(--gold-dim); font-style: italic; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 960px) {
      .banners-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .identity { flex-direction: column; text-align: center; }
      .ident-divider { display: none; }
      .banner-progress { margin-left: 0; min-width: unset; max-width: unset; width: 100%; }
      .banners-grid { grid-template-columns: repeat(2, 1fr); }
      .stats-grid   { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Banner page iframe overlay ────────────────────── */
    #banner-preview-overlay {
      display: none; position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,.85); align-items: stretch; justify-content: stretch;
      padding: 24px;
    }
    #banner-preview-overlay.open { display: flex; }
    #banner-preview-iframe {
      width: 100%; height: 100%; border: 1px solid var(--b-gold);
      border-radius: 6px; background: var(--bg);
    }
    .banner-preview-close {
      position: fixed; top: 4px; right: 12px; z-index: 710;
      background: rgba(14,14,28,.9); border: 1px solid var(--b-gold); border-radius: 50%;
      width: 36px; height: 36px; color: var(--gold); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .banner-preview-close:hover { background: rgba(201,168,76,.15); }
    .banner-card { cursor: pointer; }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   STAR FIELD
═══════════════════════════════════════════════════════ */
(function () {
  const cv = document.getElementById('starfield');
  const cx = cv.getContext('2d');
  let stars = [];

  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    stars = [];
    const n = Math.floor(cv.width * cv.height / 3800);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.1 + 0.2,
        a: Math.random() * 0.55 + 0.1,
        spd: Math.random() * 0.0004 + 0.0001
      });
    }
  }

  function draw(t) {
    cx.clearRect(0, 0, cv.width, cv.height);
    for (const s of stars) {
      const pulse = Math.sin(t * s.spd * 900 + s.x * 0.01) * 0.18 + 0.82;
      cx.beginPath();
      cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(190,210,255,${(s.a * pulse).toFixed(3)})`;
      cx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();

/* ═══════════════════════════════════════════════════════
   STATIC LOOKUP TABLES
═══════════════════════════════════════════════════════ */
const STAT_LABELS = {
  PatrolCount           : "Patrols",
  TotalLength           : "Total Patrol Length",
  FPS_Kills_Total       : "FPS Kills",
  Ship_Kills_Total      : "Ship Kills",
  Crusades_Total        : "Crusades",
  Turret_Kills_Total    : "Turret Kills",
  Quest_Total           : "Quests Completed",
  Led_Completed_Quests  : "Quests Led",
  Led_Completed_Crusades: "Crusades Led"
};

const BANNER_RANKS = {
  "The Artificer" : ["Apprentice","Tinkerer",   "Artisan",    "Craftsman"    ],
  "The Astraeus"  : ["Apprentice","Helion",      "Archon",     "Strategos"    ],
  "The Engineer"  : ["Apprentice","Technician",  "Fabricator", "Mechanic"     ],
  "The Explorer"  : ["Apprentice","Seeker",      "Wayfarer",   "Pathfinder"   ],
  "The Fang"      : ["Apprentice","Hound",       "Stalker",    "Wolf"         ],
  "The Forager"   : ["Apprentice","Scavenger",   "Harvester",  "Prospector"   ],
  "The Guardian"  : ["Apprentice","Vanguard",    "Bulwark",    "Sentinel"     ],
  "The Merchant"  : ["Apprentice","Provisioner", "Steward",    "Quartermaster"],
  "The Healer"    : ["Apprentice","Apothecary",  "Physician",  "Chirurgeon"   ],
  "The Privateer" : ["Apprentice","Wayman",      "Freeblade",  "Marauder"     ],
  "The Talon"     : ["Apprentice","Sparrow",     "Falcon",     "Raven"        ]
};

const MEDAL_IMGS = {
  "The Astraeus" : "Medals/The Astraeus - Medal.png",
  "The Explorer" : "Medals/The Explorer - Medal.png",
  "The Fang"     : "Medals/The Fang - Medal.png",
  "The Guardian" : "Medals/The Gaurdian - Medal.png",
  "The Healer"   : "Medals/The Healer - Medal.png",
  "The Merchant" : "Medals/The Merchant - Medal.png"
};

/* ═══════════════════════════════════════════════════════
   REPUTATION HELPERS
═══════════════════════════════════════════════════════ */
function getLevelXP() {
  try {
    const v = JSON.parse(localStorage.getItem('ofs_level_xp') || 'null');
    if (Array.isArray(v) && v.length) return v;
  } catch(e) {}
  const MIN = 100, MAX = 1_000_000, N = 100;
  return Array.from({length: N}, (_, i) =>
    i === 0 ? MIN : Math.floor(MIN * Math.pow(MAX / MIN, i / (N - 1)))
  );
}

function calcRep(xp) {
  const LEVEL_XP = getLevelXP();
  const maxLvl = LEVEL_XP.length;
  let lvl = 1;
  for (let i = 0; i < maxLvl; i++) {
    if (xp >= LEVEL_XP[i]) lvl = i + 1; else break;
  }
  lvl = Math.min(lvl, maxLvl);
  const isMax   = lvl >= maxLvl;
  const floorXP = LEVEL_XP[lvl - 1];
  const ceilXP  = isMax ? floorXP : LEVEL_XP[lvl];
  const pct     = isMax ? 100 : Math.min(((xp - floorXP) / (ceilXP - floorXP)) * 100, 100);
  const toNext  = isMax ? 0 : ceilXP - xp;
  return { lvl, xp, floorXP, ceilXP, pct, toNext, isMax };
}

/* ═══════════════════════════════════════════════════════
   RANK LOGIC
═══════════════════════════════════════════════════════ */
function rankInfo(name, pts, medal) {
  const r = BANNER_RANKS[name];
  if (!r) return { title: 'Apprentice', idx: 0 };
  let idx;
  if      (pts >= 60 && medal) idx = 3;
  else if (pts >= 30)          idx = 2;
  else if (pts >= 15)          idx = 1;
  else                          idx = 0;
  return { title: r[idx], idx };
}

function progressInfo(pts, medal, bannerName) {
  const ranks = BANNER_RANKS[bannerName] || ['Apprentice','Rank 2','Rank 3','Master'];
  if (pts >= 60 && medal)
    return { pct: 100, cur: `${pts} pts`, nxt: null, locked: false, maxed: true };
  if (pts >= 30) {
    if (!medal)
      return { pct: 100, cur: `${pts} pts`, nxt: `Medal required for ${ranks[3]}`, locked: true, maxed: false };
    const pct = Math.min(((pts - 30) / 30) * 100, 100);
    return { pct, cur: `${pts} / 60 pts`, nxt: `→ ${ranks[3]}`, locked: false, maxed: false };
  }
  if (pts >= 15) {
    const pct = ((pts - 15) / 15) * 100;
    return { pct, cur: `${pts} / 30 pts`, nxt: `→ ${ranks[2]}`, locked: false, maxed: false };
  }
  const pct = (pts / 15) * 100;
  return { pct, cur: `${pts} / 15 pts`, nxt: `→ ${ranks[1]}`, locked: false, maxed: false };
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function buildLocked() {
  const wrap = document.createElement('div');
  wrap.className = 'medal-locked';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', 'M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z');
  svg.appendChild(path);
  wrap.appendChild(svg);
  return wrap;
}

function render(p) {
  // Breadcrumb + title
  document.title = `${p.username} — Player Sheet`;
  const breadcrumbEl = document.getElementById('breadcrumb-name');
  if (breadcrumbEl) breadcrumbEl.textContent = p.username;

  // Identity
  document.getElementById('js-username').textContent = p.username;
  document.getElementById('js-rank').textContent     = p.rank;

  // Banner name + banner rank title under the org rank
  const bData    = p.banners[p.activeBanner] || { p: 0, m: false };
  const bTitle   = rankInfo(p.activeBanner, bData.p, bData.m).title;
  const bannerEl = document.getElementById('js-banner');
  if (p.activeBanner) {
    bannerEl.innerHTML =
      `<span class="ident-banner-name">${p.activeBanner}</span>` +
      `<span class="ident-banner-sep">·</span>` +
      `<span class="ident-banner-rank">${bTitle}</span>`;

    // Set banner hero as identity background
    const defs = (window.OFSSheets && OFSSheets.getBannerDefs) ? OFSSheets.getBannerDefs() : [];
    const banDef = defs.find(d => d.name === p.activeBanner);
    if (banDef && banDef.bannerImageUrl) {
      const m = banDef.bannerImageUrl.match(/\/file\/d\/([^/?#]+)/);
      const heroUrl = m ? 'https://lh3.googleusercontent.com/d/' + m[1] : banDef.bannerImageUrl;
      const identityEl = document.querySelector('.identity');
      const oldBg = identityEl.querySelector('.identity-bg');
      if (oldBg) oldBg.remove();
      const bg = document.createElement('div');
      bg.className = 'identity-bg';
      bg.style.backgroundImage = 'url(' + heroUrl + ')';
      identityEl.appendChild(bg);
    }
  } else {
    bannerEl.innerHTML = '';
  }

  // Banner progress bar (top-right of identity)
  const bpEl = document.getElementById('js-banner-progress');
  if (p.activeBanner && BANNER_RANKS[p.activeBanner]) {
    const pts = bData.p || 0;
    const hasMedal = bData.m || false;
    const ranks = BANNER_RANKS[p.activeBanner];
    const thresholds = [0, 15, 30, 60];
    const { idx } = rankInfo(p.activeBanner, pts, hasMedal);

    // Build 3 step segments (0→15, 15→30, 30→60)
    let stepsHTML = '';
    for (let i = 0; i < 3; i++) {
      const lo = thresholds[i], hi = thresholds[i + 1];
      let cls = '', fillStyle = '', fillCls = '';
      if (pts >= hi) {
        cls = 'complete';
        fillStyle = 'width:100%';
        if (i === 2 && hasMedal) fillCls = ' maxed';
      } else if (pts > lo) {
        cls = 'partial';
        const pct = ((pts - lo) / (hi - lo)) * 100;
        fillStyle = 'width:' + pct.toFixed(1) + '%';
      }
      stepsHTML += `<div class="bp-step ${cls}"><div class="bp-step-fill${fillCls}" style="${fillStyle}"></div></div>`;
    }

    // Medal image at end
    const defs2 = (window.OFSSheets && OFSSheets.getBannerDefs) ? OFSSheets.getBannerDefs() : [];
    const banDef2 = defs2.find(d => d.name === p.activeBanner);
    let medalUrl = '';
    if (banDef2 && banDef2.medalUrl) {
      const mm = banDef2.medalUrl.match(/\/file\/d\/([^/?#]+)/);
      medalUrl = mm ? 'https://drive.google.com/thumbnail?id=' + mm[1] + '&sz=w400' : banDef2.medalUrl;
    } else if (MEDAL_IMGS[p.activeBanner]) {
      medalUrl = MEDAL_IMGS[p.activeBanner];
    }
    const medalLocked = !hasMedal;
    const medalImg = medalUrl
      ? `<img class="bp-medal-end${medalLocked ? ' locked' : ''}" src="${medalUrl}" alt="" onerror="this.style.display='none'">`
      : '';

    // Rank markers
    const markersHTML = ranks.map((r, i) =>
      `<div class="bp-marker${i === idx ? ' active' : ''}">${r}</div>`
    ).join('');

    // Points summary line
    const nextIdx = idx + 1;
    let ptsLine = '';
    if (idx === 3 && hasMedal) {
      ptsLine = `<span>${pts}</span> pts · Max Rank`;
    } else if (nextIdx < 4) {
      const nextThresh = thresholds[nextIdx];
      const toGo = nextThresh - pts;
      ptsLine = `<span>${pts}</span> / ${nextThresh} pts · ${toGo} to next rank`;
    } else {
      ptsLine = `<span>${pts}</span> pts · Medal required`;
    }

    // Styled tooltip rows
    const tipRows = ranks.map((r, i) => {
      const th = thresholds[i];
      const label = i === 3 ? `${th} pts + Medal` : i === 0 ? 'Starting rank' : `${th} pts`;
      const cls = i === idx ? 'active' : (i < idx ? 'done' : '');
      return `<div class="bp-tip-row ${cls}"><span class="bp-tip-dot"></span>${r}<span class="bp-tip-pts">${label}</span></div>`;
    }).join('');

    bpEl.style.display = '';
    bpEl.removeAttribute('title');
    bpEl.innerHTML =
      `<div class="bp-tooltip">` +
        `<div class="bp-tip-title">${p.activeBanner}</div>` +
        `${tipRows}` +
      `</div>` +
      `<div class="bp-label">${p.activeBanner} — Progress</div>` +
      `<div class="bp-track">${stepsHTML}${medalImg}</div>` +
      `<div class="bp-markers">${markersHTML}</div>` +
      `<div class="bp-pts-label">${ptsLine}</div>`;
  } else {
    bpEl.style.display = 'none';
  }

  // Ship on its own line
  const shipEl = document.getElementById('js-ship');
  shipEl.textContent = p.ship || '';

  const avatarEl = document.getElementById('js-avatar');
  if (p.avatarUrl) {
    avatarEl.innerHTML = `<img src="${p.avatarUrl}" alt="${p.username}">`;
  } else {
    avatarEl.textContent = p.username.charAt(0).toUpperCase();
  }

  // Reputation — uses raw reputationXP from Member Log
  const rep   = calcRep(p.reputationXP || 0);
  const repEl = document.getElementById('js-rep');
  const xpLine = rep.isMax
    ? `${rep.xp.toLocaleString()} XP — MAX LEVEL`
    : `${rep.xp.toLocaleString()} / ${rep.ceilXP.toLocaleString()} XP · ${rep.toNext.toLocaleString()} to Level ${rep.lvl + 1}`;
  repEl.innerHTML = `
    <div class="rep-header">
      <span class="rep-label">Reputation</span>
      <span class="rep-level${rep.isMax ? ' rep-level-max' : ''}">Level ${rep.lvl}</span>
      <span class="rep-xp-label">${xpLine}</span>
    </div>
    <div class="rep-bar-bg">
      <div class="rep-bar-fill${rep.isMax ? ' maxed' : ''}" style="width:${rep.pct.toFixed(1)}%"></div>
    </div>`;

  // Stats
  const statsGrid = document.getElementById('js-stats');
  statsGrid.innerHTML = '';
  const statsToShow = {
    PatrolCount:            p.stats.PatrolCount,
    TotalLength:            window.OFSData.formatPatrolLength(p.stats.TotalLength),
    FPS_Kills_Total:        p.stats.FPS_Kills_Total,
    Ship_Kills_Total:       p.stats.Ship_Kills_Total,
    Crusades_Total:         p.stats.Crusades_Total,
    Turret_Kills_Total:     p.stats.Turret_Kills_Total,
    Quest_Total:            p.stats.Quest_Total,
    Led_Completed_Quests:   p.stats.Led_Completed_Quests,
    Led_Completed_Crusades: p.stats.Led_Completed_Crusades
  };
  for (const [key, val] of Object.entries(statsToShow)) {
    const div = document.createElement('div');
    div.className = 'stat-card';
    div.innerHTML = `<div class="stat-lbl">${STAT_LABELS[key]}</div><div class="stat-val">${typeof val === 'number' ? val.toLocaleString() : val}</div>`;
    statsGrid.appendChild(div);
  }

  // Banners — live data uses { p, m } format
  const bannersGrid = document.getElementById('js-banners');
  bannersGrid.innerHTML = '';
  for (const [name, bData] of Object.entries(p.banners)) {
    const pts   = bData.p || 0;
    const medal = bData.m || false;
    const { title, idx } = rankInfo(name, pts, medal);
    const prog           = progressInfo(pts, medal, name);
    const hasMedalImg    = name in MEDAL_IMGS;

    const medalWrap = document.createElement('div');
    medalWrap.className = 'medal-wrap';
    // Try sheet defs first, then local MEDAL_IMGS
    const sheetDefs = (window.OFSSheets && OFSSheets.getBannerDefs) ? OFSSheets.getBannerDefs() : [];
    const sheetDef = sheetDefs.find(d => d.name === name);
    let medalSrc = '';
    if (sheetDef && sheetDef.medalUrl) {
      const mm = sheetDef.medalUrl.match(/\/file\/d\/([^/?#]+)/);
      medalSrc = mm ? 'https://drive.google.com/thumbnail?id=' + mm[1] + '&sz=w400' : sheetDef.medalUrl;
    } else if (MEDAL_IMGS[name]) {
      medalSrc = MEDAL_IMGS[name];
    }
    if (medalSrc) {
      const img = document.createElement('img');
      img.src = medalSrc;
      img.alt = `Medal — ${name}`;
      if (!medal) img.style.filter = 'grayscale(1) brightness(.35)';
      img.addEventListener('error', () => { medalWrap.innerHTML = ''; medalWrap.appendChild(buildLocked()); });
      medalWrap.appendChild(img);
    } else {
      medalWrap.appendChild(buildLocked());
    }

    let progRight = '';
    if (prog.locked)    progRight = `<span class="prog-lock">${prog.nxt}</span>`;
    else if (prog.nxt)  progRight = `<span class="prog-next">${prog.nxt}</span>`;

    const cardClass = ['banner-card', medal ? 'has-medal' : '', idx === 3 ? 'is-master' : ''].filter(Boolean).join(' ');
    const card = document.createElement('div');
    card.className = cardClass;
    card.appendChild(medalWrap);

    const rest = document.createElement('div');
    rest.innerHTML = `
      <div class="banner-name">${name}</div>
      <div class="banner-title t${idx}">${title}</div>
      <div class="prog-wrap">
        <div class="prog-bg">
          <div class="prog-fill${prog.maxed ? ' maxed' : ''}" style="width:${prog.pct.toFixed(1)}%"></div>
        </div>
        <div class="prog-labels">
          <span class="prog-cur">${prog.cur}</span>
          ${progRight}
        </div>
      </div>`;
    while (rest.firstChild) card.appendChild(rest.firstChild);
    card.addEventListener('click', () => openBannerPreview(name));
    bannersGrid.appendChild(card);
  }
}

function openBannerPreview(bannerName) {
  const iframe = document.getElementById('banner-preview-iframe');
  iframe.src = 'OFS_Banner.html?banner=' + encodeURIComponent(bannerName);
  document.getElementById('banner-preview-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeBannerPreview() {
  document.getElementById('banner-preview-overlay').classList.remove('open');
  document.getElementById('banner-preview-iframe').src = 'about:blank';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeBannerPreview();
});

/* ═══════════════════════════════════════════════════════
   INIT — render from cache, then refresh with live data
═══════════════════════════════════════════════════════ */
const _playerId = new URLSearchParams(window.location.search).get('player');

function tryRender() {
  const p = window.OFSData && (
    _playerId ? window.OFSData.getPlayerById(_playerId) : window.OFSData.getPlayers()[0]
  );
  if (p) render(p);
}

tryRender(); // instant from cache

OFSSheets.load().then(function() {
  tryRender(); // re-render with fresh sheet data
  if (window.OFSNav) OFSNav.refresh();
});

window.addEventListener('storage', function(event) {
  if (window.OFSData && event.key === window.OFSData.STORAGE_PLAYERS) tryRender();
});
</script>
<script>if(window.parent!==window)window.parent.postMessage({type:'ofs-page-load',page:'playersheet'},'*');</script>
