<!DOCTYPE html>
<html lang="en" style="background:#07070f">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner — Order of the Fallen Star</title>
  <link rel="icon" type="image/png" href="ofs favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ofs-api.orderofthefallenstar.workers.dev" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="preconnect" href="https://drive.google.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070f;
      --bg-card:   #0e0e1c;
      --bg-card2:  #13132a;
      --gold:      #c9a84c;
      --gold-lt:   #e8ca6a;
      --gold-dim:  #6e5a28;
      --silver:    #b0b8c8;
      --silver-dim:#5a6272;
      --text:      #ddd8cc;
      --text-dim:  #7a7568;
      --b-gold:    rgba(201,168,76,.28);
      --b-dim:     rgba(201,168,76,.09);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb {
      background: var(--gold-dim);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    * { scrollbar-width: thin; scrollbar-color: var(--gold-dim) var(--bg); }

    html { font-size: 16px; scroll-behavior: smooth; background: #07070f; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── Hero ─────────────────────────────────────────── */
    .banner-hero {
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: flex-end;
      background: var(--bg-card) center center / cover no-repeat;
      margin-top: 62px;
    }
    .banner-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(7,7,15,.3) 0%, rgba(7,7,15,.85) 70%, var(--bg) 100%);
    }
    .banner-hero-content {
      position: relative; z-index: 1;
      width: 100%; max-width: 860px;
      margin: 0 auto;
      padding: 0 40px 48px;
      display: flex;
      align-items: flex-end;
      gap: 36px;
    }
    .banner-hero-medal {
      width: 120px; height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(201,168,76,.4));
      flex-shrink: 0;
    }
    .banner-hero-medal-placeholder {
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; flex-shrink: 0;
      color: var(--gold-dim);
    }
    .banner-hero-text {}
    .banner-hero-label {
      font-family: 'Cinzel', serif;
      font-size: .65rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(201,168,76,.6);
    }
    .banner-hero-name {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--gold-lt);
      text-shadow: 0 0 40px rgba(201,168,76,.3);
      line-height: 1;
      margin-bottom: 14px;
    }
    .banner-hero-desc {
      font-family: 'Crimson Text', serif;
      font-size: 1.05rem; line-height: 1.7;
      color: var(--text); max-width: 560px;
    }

    /* ── Nav row ──────────────────────────────────────── */
    .banner-nav-row {
      max-width: 860px; margin: 0 auto;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--b-dim);
    }
    .banner-back {
      font-family: 'Cinzel', serif;
      font-size: .68rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--silver-dim); text-decoration: none;
      transition: color .2s;
    }
    .banner-back:hover { color: var(--gold); }
    .banner-arrows {
      display: flex; gap: 10px;
    }
    .banner-arrow-btn {
      font-family: 'Cinzel', serif;
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--silver-dim); background: none;
      border: 1px solid var(--b-dim); border-radius: 2px;
      padding: 6px 14px; cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
      white-space: nowrap;
    }
    .banner-arrow-btn:hover { color: var(--gold); border-color: var(--b-gold); background: rgba(201,168,76,.06); }
    .banner-arrow-btn:disabled { opacity: .25; cursor: default; }

    /* ── Body layout ──────────────────────────────────── */
    .banner-body {
      max-width: 860px; margin: 0 auto;
      padding: 48px 40px 80px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 48px;
      align-items: start;
    }

    /* ── Sub-rank progression ─────────────────────────── */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold-dim); margin-bottom: 6px;
    }
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 4px;
    }
    .section-rule {
      width: 40px; height: 1px;
      background: var(--gold-dim);
      margin-bottom: 24px;
    }
    .rank-track {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }
    .rank-track::before {
      content: '';
      position: absolute;
      left: 15px; top: 24px; bottom: 24px;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold-dim), rgba(201,168,76,.1));
    }
    .rank-tier {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 16px 0;
      position: relative;
    }
    .rank-tier-dot {
      width: 31px; height: 31px;
      border-radius: 50%;
      border: 1px solid var(--b-gold);
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Cinzel', serif; font-size: .6rem; color: var(--gold-dim);
      position: relative; z-index: 1;
    }
    .rank-tier-dot.master {
      border-color: var(--gold);
      background: rgba(201,168,76,.08);
      color: var(--gold);
    }
    .rank-tier-dot.master img {
      width: 24px; height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 4px rgba(201,168,76,.4));
    }
    .rank-tier-info {}
    .rank-tier-name {
      font-family: 'Cinzel', serif;
      font-size: .82rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text); margin-bottom: 3px;
    }
    .rank-tier-name.master { color: var(--gold-lt); }
    .rank-tier-pts {
      font-family: 'Inter', sans-serif;
      font-size: .7rem; color: var(--text-dim);
    }

    /* ── Roster ───────────────────────────────────────── */
    .banner-roster-section { }
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .member-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--b-dim);
      border-radius: 3px;
      padding: 10px 14px;
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }
    .member-card:hover {
      border-color: var(--b-gold);
      background: rgba(201,168,76,.04);
    }
    .member-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--b-gold);
      background: var(--bg-card2);
      flex-shrink: 0;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name {
      font-family: 'Cinzel', serif;
      font-size: .75rem; letter-spacing: .08em;
      color: var(--text); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .member-rank {
      font-family: 'Inter', sans-serif;
      font-size: .65rem; color: var(--text-dim);
      margin-top: 2px;
    }
    .member-pts {
      font-family: 'Cinzel', serif;
      font-size: .62rem; letter-spacing: .06em;
      color: var(--gold-dim); flex-shrink: 0;
      text-align: right;
    }
    .member-pts span {
      display: block; color: var(--gold);
      font-size: .75rem;
    }
    .no-members {
      font-family: 'Crimson Text', serif;
      font-size: .95rem; color: var(--text-dim);
      font-style: italic;
      padding: 12px 0;
    }
    .show-more-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px 0;
      background: var(--bg-card);
      border: 1px solid var(--b-gold);
      border-radius: 3px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .show-more-btn:hover {
      background: rgba(201,168,76,.08);
      color: var(--gold-lt);
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--b-dim);
      text-align: center;
      padding: 40px 20px;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 6px;
      flex-wrap: wrap; list-style: none; margin-bottom: 18px;
    }
    .footer-links li::before { content:'·'; color:var(--b-gold); margin-right:6px; }
    .footer-links li:first-child::before { display: none; }
    .footer-links a {
      font-family: 'Cinzel', serif; font-size: .62rem;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--silver-dim); text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy {
      font-family: 'Inter', sans-serif; font-size: .7rem;
      color: var(--text-dim); margin-bottom: 20px;
    }
    .footer-sc { opacity: .35; transition: opacity .2s; }
    .footer-sc:hover { opacity: .55; }
    .footer-sc img { height: 48px; display: block; margin: 0 auto; }

    /* ── Loading state ────────────────────────────────── */
    .banner-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 62px);
      font-family: 'Cinzel', serif; font-size: .8rem;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 700px) {
      .banner-body { grid-template-columns: 1fr; gap: 40px; }
      .banner-hero-content { flex-direction: column; align-items: flex-start; gap: 20px; padding: 0 20px 36px; }
      .banner-nav-row { padding: 16px 20px; }
      .banner-hero-name { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<nav id="main-nav"></nav>

<div id="banner-loading" class="banner-loading">Loading…</div>
<div id="banner-page" style="display:none">

  <!-- Hero -->
  <section class="banner-hero" id="banner-hero">
    <div class="banner-hero-overlay"></div>
    <div class="banner-hero-content">
      <div id="banner-medal-wrap"></div>
      <div class="banner-hero-text">
        <div class="banner-hero-label">The Eleven Banners</div>
        <h1 class="banner-hero-name" id="banner-hero-name">—</h1>
        <p class="banner-hero-desc" id="banner-hero-desc"></p>
      </div>
    </div>
  </section>

  <!-- Nav row -->
  <div class="banner-nav-row">
    <a href="#" onclick="history.back();return false;" class="banner-back">← Back</a>
    <div class="banner-arrows">
      <button class="banner-arrow-btn" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <button class="banner-arrow-btn" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <!-- Body -->
  <div class="banner-body">

    <!-- Left: sub-rank progression -->
    <div>
      <div class="section-label">Path of Service</div>
      <div class="section-title" id="rank-section-title">Sub-Rank Progression</div>
      <div class="section-rule"></div>
      <div class="rank-track" id="rank-track"></div>
    </div>

    <!-- Right: roster -->
    <div class="banner-roster-section">
      <div class="section-label">Active Members</div>
      <div class="section-title" id="roster-count-title">Roster</div>
      <div class="section-rule"></div>
      <div class="member-list" id="member-list"></div>
    </div>

  </div>

</div><!-- /banner-page -->

<!-- Footer -->
<footer>
  <ul class="footer-links">
    <li><a href="OFS_Home.html">Home</a></li>
    <li><a href="OFS_Codex.html">Codex</a></li>
    <li><a href="OFS_Timeline.html">Chronicles</a></li>
    <li><a href="OFS_Roster.html">Roster</a></li>
    <li><a href="OFS_TavernHall.html">Tavern Hall</a></li>
  </ul>
  <div class="footer-copy">Order of the Fallen Star &nbsp;·&nbsp; Star Citizen Organization</div>
  <div class="footer-sc">
    <a href="https://robertsspaceindustries.com/en/orgs/FALLSTR" target="_blank" rel="noopener">
      <img src="Star-Citizen-Logo-white.png" alt="Star Citizen">
    </a>
  </div>
</footer>

<script src="ofs-data.js"></script>
<script src="ofs-sheets.js"></script>
<script src="header_bar.js"></script>
<script src="ofs-nav.js"></script>
<script>
(function(){
  'use strict';

  var RANK_THRESHOLDS = [0, 15, 30, 60];

  function driveDirect(url, size) {
    if (!url) return '';
    var m = url.match(/\/file\/d\/([^/?#]+)/);
    if (!m) return url;
    // Use lh3 for full-res (hero), thumbnail API for small previews
    if (size === 'full') return 'https://lh3.googleusercontent.com/d/' + m[1];
    return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=' + (size || 'w400');
  }

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }

  var _defs = [];
  var _currentIdx = 0;

  function renderBanner(def, players) {
    // Hero background
    var hero = document.getElementById('banner-hero');
    var heroImg = driveDirect(def.bannerImageUrl, 'full');
    if (heroImg) hero.style.backgroundImage = 'url(' + heroImg + ')';

    // Medal
    var medalWrap = document.getElementById('banner-medal-wrap');
    var medalSrc = driveDirect(def.medalUrl);
    if (medalSrc) {
      medalWrap.innerHTML = '<img class="banner-hero-medal" src="' + medalSrc + '" alt="' + def.name + ' medal" onerror="this.style.display=\'none\'">';
    } else {
      medalWrap.innerHTML = '<div class="banner-hero-medal-placeholder">★</div>';
    }

    // Name + desc
    document.title = def.name + ' — Order of the Fallen Star';
    document.getElementById('banner-hero-name').textContent = def.name;
    document.getElementById('banner-hero-desc').textContent = def.description || '';

    // Sub-rank track
    var tiers = [
      { name: def.subRank0      || 'Apprentice',     pts: 0,  master: false },
      { name: def.subRank1      || 'Sub Rank I',      pts: 15, master: false },
      { name: def.subRank2      || 'Sub Rank II',     pts: 30, master: false },
      { name: def.subRankMaster || 'Sub Rank Master', pts: 60, master: true  },
    ];
    document.getElementById('rank-section-title').textContent = def.name + ' Progression';
    var track = document.getElementById('rank-track');
    track.innerHTML = tiers.map(function(t, i) {
      var label = i === 3
        ? (def.medalName || 'Medal') + ' required'
        : t.pts === 0 ? 'Starting rank' : t.pts + ' banner points';
      var medalSrc2 = t.master ? driveDirect(def.medalUrl) : '';
      var dotContent = (t.master && medalSrc2)
        ? '<img src="' + medalSrc2 + '" alt="" onerror="this.replaceWith(document.createTextNode(\'' + (i + 1) + '\'))">'
        : (i + 1);
      return '<div class="rank-tier">' +
        '<div class="rank-tier-dot' + (t.master ? ' master' : '') + '">' + dotContent + '</div>' +
        '<div class="rank-tier-info">' +
          '<div class="rank-tier-name' + (t.master ? ' master' : '') + '">' + t.name + '</div>' +
          '<div class="rank-tier-pts">' + label + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    // Roster — members whose activeBanner matches
    var bannerName = def.name;
    var members = (players || []).filter(function(p) {
      return p.activeBanner === bannerName;
    });
    // Sort by banner points descending
    members.sort(function(a, b) {
      var ap = (a.banners && a.banners[bannerName]) ? (a.banners[bannerName].p || 0) : 0;
      var bp = (b.banners && b.banners[bannerName]) ? (b.banners[bannerName].p || 0) : 0;
      return bp - ap;
    });
    document.getElementById('roster-count-title').textContent =
      members.length + ' Member' + (members.length !== 1 ? 's' : '');

    var list = document.getElementById('member-list');
    var SHOW_LIMIT = 20;
    var buildCard = function(p) {
      var pts = (p.banners && p.banners[bannerName]) ? (p.banners[bannerName].p || 0) : 0;
      var hasMedal = (p.banners && p.banners[bannerName]) ? !!p.banners[bannerName].m : false;
      var avatarSrc = driveDirect(p.avatarUrl) || 'ofs_logo.png';
      return '<a class="member-card" href="OFS_PlayerSheet.html?player=' + encodeURIComponent(p.id) + '">' +
        '<img class="member-avatar" src="' + avatarSrc + '" alt="' + p.username + '" onerror="this.src=\'ofs_logo.png\'">' +
        '<div class="member-info">' +
          '<div class="member-name">' + p.username + '</div>' +
          '<div class="member-rank">' + p.rank + '</div>' +
        '</div>' +
        '<div class="member-pts">' +
          (hasMedal ? '<span>★ ' + pts + ' pts</span>' : '<span>' + pts + ' pts</span>') +
        '</div>' +
      '</a>';
    };
    if (!members.length) {
      list.innerHTML = '<div class="no-members">No members currently enlisted in this banner.</div>';
    } else {
      var visible = members.slice(0, SHOW_LIMIT);
      var hidden = members.slice(SHOW_LIMIT);
      list.innerHTML = visible.map(buildCard).join('');
      if (hidden.length > 0) {
        var showBtn = document.createElement('button');
        showBtn.className = 'show-more-btn';
        showBtn.textContent = 'Show ' + hidden.length + ' More Members';
        showBtn.onclick = function() {
          showBtn.parentNode.removeChild(showBtn);
          var tmp = document.createElement('div');
          tmp.innerHTML = hidden.map(buildCard).join('');
          while (tmp.firstChild) { list.appendChild(tmp.firstChild); }
        };
        list.appendChild(showBtn);
      }
    }

    // Prev/next buttons
    var prevBtn = document.getElementById('btn-prev');
    var nextBtn = document.getElementById('btn-next');
    if (_currentIdx <= 0) {
      prevBtn.disabled = true;
      prevBtn.textContent = '← Prev';
    } else {
      prevBtn.disabled = false;
      prevBtn.textContent = '← ' + _defs[_currentIdx - 1].name;
    }
    if (_currentIdx >= _defs.length - 1) {
      nextBtn.disabled = true;
      nextBtn.textContent = 'Next →';
    } else {
      nextBtn.disabled = false;
      nextBtn.textContent = _defs[_currentIdx + 1].name + ' →';
    }
  }

  window.navigate = function(dir) {
    var idx = _currentIdx + dir;
    if (idx < 0 || idx >= _defs.length) return;
    var name = _defs[idx].name;
    history.pushState({}, '', '?banner=' + encodeURIComponent(name));
    _currentIdx = idx;
    renderBanner(_defs[idx], window._bannerPlayers || []);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function init(defs, players) {
    _defs = defs;
    window._bannerPlayers = players;

    var requested = getParam('banner');
    var idx = defs.findIndex(function(d) {
      return d.name.toLowerCase() === requested.toLowerCase();
    });
    if (idx < 0) idx = 0;
    _currentIdx = idx;

    document.getElementById('banner-loading').style.display = 'none';
    document.getElementById('banner-page').style.display = '';
    renderBanner(defs[idx], players);
  }

  // Render from cache immediately if available
  var cachedDefs = OFSSheets.getBannerDefs();
  var cachedPlayers = (window.OFSData && OFSData.getPlayers()) || [];
  if (cachedDefs && cachedDefs.length) {
    init(cachedDefs, cachedPlayers);
  }

  // Fetch fresh data and re-render
  OFSSheets.load().then(function(players) {
    var defs = OFSSheets.getBannerDefs();
    if (defs && defs.length) init(defs, players || []);
    if (window.OFSNav) OFSNav.refresh();
  });

  // Handle browser back/forward
  window.addEventListener('popstate', function() {
    var requested = getParam('banner');
    var idx = _defs.findIndex(function(d) {
      return d.name.toLowerCase() === requested.toLowerCase();
    });
    if (idx >= 0) {
      _currentIdx = idx;
      renderBanner(_defs[idx], window._bannerPlayers || []);
    }
  });

}());
</script>
</body>
</html>
